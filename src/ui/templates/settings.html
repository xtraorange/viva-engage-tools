{% extends "base.html" %}

{% block title %}App Settings{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h1>General Settings</h1>
</div>

<form method="post" class="mb-4" data-unsaved-guard="true">
  <div class="row">
    <div class="col-md-6">
      <fieldset class="mb-4">
        <legend class="mb-3">
          Output Settings
        </legend>
        <div class="field-padded">
        <div class="mb-3">
          <label for="output_dir" class="form-label">
            Output Directory
            <span class="badge bg-secondary" data-bs-toggle="tooltip" title="Where CSV files will be saved. Can be an absolute path or relative to current directory.">?</span>
          </label>
          <div class="input-group">
            <input type="text" class="form-control" id="output_dir" name="output_dir" value="{{ config.output_dir }}" placeholder="e.g., ./output or C:\\Reports">
            <button class="btn btn-outline-secondary" type="button" id="browse_output_dir">Browse...</button>
          </div>
        </div>
        <div class="mb-3">
          <label for="ui_port" class="form-label">
            Web App Port
            <span class="badge bg-secondary" data-bs-toggle="tooltip" title="HTTP port used by the web UI. Change this if 5000 is already in use.">?</span>
          </label>
          <input type="number" class="form-control" id="ui_port" name="ui_port" value="{{ config.ui_port }}" placeholder="e.g., 5000">
        </div>
        <div class="mb-3">
          <label for="max_workers" class="form-label">
            Max Workers
            <span class="badge bg-secondary" data-bs-toggle="tooltip" title="Number of parallel jobs to run. Set to CPU count for optimal performance.">?</span>
          </label>
          <input type="number" class="form-control" id="max_workers" name="max_workers" value="{{ config.max_workers }}" placeholder="Defaults to CPU count">
        </div>
        </div>
      </fieldset>
      <fieldset class="mb-4">
        <legend class="mb-3">
          Email Settings
        </legend>
        <div class="field-padded">
        <div class="mb-3">
          <label for="email_method" class="form-label">
            Email Method
            <span class="badge bg-secondary" data-bs-toggle="tooltip" title="SMTP: send via an SMTP server | Outlook: send via Outlook application">?</span>
          </label>
          <select class="form-select" id="email_method" name="email_method">
            <option value="smtp" {% if config.get('email_method')=='smtp' %}selected{% endif %}>SMTP</option>
            <option value="outlook" {% if config.get('email_method')=='outlook' %}selected{% endif %}>Outlook</option>
          </select>
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="outlook_auto_send" name="outlook_auto_send" {% if config.get('outlook_auto_send') %}checked{% endif %}>
          <label class="form-check-label" for="outlook_auto_send">
            Outlook Auto Send
            <span class="badge bg-secondary" data-bs-toggle="tooltip" title="If checked, emails will be sent automatically. If unchecked, they'll open in Outlook for manual review.">?</span>
          </label>
        </div>
        <div class="mb-3">
          <label for="email_recipient" class="form-label">
            Default Recipient
            <span class="badge bg-secondary" data-bs-toggle="tooltip" title="Default email address for report delivery (can be overridden per group)">?</span>
          </label>
          <input type="email" class="form-control" id="email_recipient" name="email_recipient" value="{{ config.email_recipient }}" placeholder="e.g., reports@company.com">
        </div>
        </div>
      </fieldset>


<fieldset>
        <legend class="mb-3">
          SMTP Settings
        </legend>
        <div class="field-padded">
        <div class="mb-3">
          <label for="smtp_server" class="form-label">
            SMTP Server
            <span class="badge bg-secondary" data-bs-toggle="tooltip" title="Hostname or IP of your SMTP server (e.g., smtp.gmail.com, mail.company.com)">?</span>
          </label>
          <input type="text" class="form-control" id="smtp_server" name="smtp_server" value="{{ config.smtp_server }}" placeholder="e.g., smtp.gmail.com">
        </div>
        <div class="mb-3">
          <label for="smtp_port" class="form-label">
            SMTP Port
            <span class="badge bg-secondary" data-bs-toggle="tooltip" title="Port number: typically 25 (plain), 587 (TLS), or 465 (SSL)">?</span>
          </label>
          <input type="number" class="form-control" id="smtp_port" name="smtp_port" value="{{ config.smtp_port }}" placeholder="e.g., 587">
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="smtp_use_tls" name="smtp_use_tls" {% if config.get('smtp_use_tls') %}checked{% endif %}>
          <label class="form-check-label" for="smtp_use_tls">
            Use TLS
            <span class="badge bg-secondary" data-bs-toggle="tooltip" title="Enable TLS encryption for the SMTP connection">?</span>
          </label>
        </div>
        <div class="mb-3">
          <label for="smtp_from" class="form-label">
            From Address
            <span class="badge bg-secondary" data-bs-toggle="tooltip" title="Email address that reports will be sent from">?</span>
          </label>
          <input type="email" class="form-control" id="smtp_from" name="smtp_from" value="{{ config.smtp_from }}" placeholder="e.g., noreply@company.com">
        </div>
        </div>
      </fieldset>
      
    </div>
    <div class="col-md-6">
            <fieldset class="mb-4">
        <legend class="mb-3">
          Database Settings
        </legend>
        <div class="field-padded">
        <div class="mb-3">
          <label for="oracle_tns" class="form-label">
            Oracle TNS
            <span class="badge bg-secondary" data-bs-toggle="tooltip" title="The Oracle TNS string for your database connection (e.g., tnsname or full connection string)">?</span>
          </label>
          <input type="text" class="form-control" id="oracle_tns" name="oracle_tns" value="{{ config.oracle_tns }}" placeholder="e.g., MYDB or server:1521/MYDB">
        </div>
        </div>
      </fieldset>
      <fieldset class="mb-4">
        <legend class="mb-3">Actions</legend>
        <div class="field-padded">
          <div class="d-grid gap-2">
            <a href="{{ url_for('main.adhoc_match') }}" class="btn btn-outline-secondary">Ad Hoc Name Matcher</a>
            <a href="{{ url_for('updates.email_templates') }}" class="btn btn-outline-secondary">Email Templates</a>
            <a href="{{ url_for('updates.updates') }}" class="btn btn-outline-secondary">Updates</a>
            <hr class="my-1">
            <a href="{{ url_for('updates.backup') }}" class="btn btn-primary">Backup Configuration</a>
            <a href="{{ url_for('updates.restore') }}" class="btn btn-outline-primary">Restore Configuration</a>

            <hr class="my-1">
            <button type="button" id="restart-app" class="btn btn-warning">Restart App</button>
            <button type="submit" name="reset_stats" value="1" class="btn btn-outline-danger w-100" onclick="return confirm('Reset all tracked app statistics?');">Reset Statistics</button>
          </div>
        </div>
      </fieldset>

      
    </div>
  </div>
  <button type="submit" class="btn btn-primary mt-3">Save</button>
</form>

<script>
  // Initialize Bootstrap tooltips if available
  if (typeof bootstrap !== 'undefined') {
    const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    const tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
      return new bootstrap.Tooltip(tooltipTriggerEl)
    })
  }

  // Folder picker for output directory
  document.getElementById('browse_output_dir').addEventListener('click', async function() {
    try {
      const response = await fetch('/api/pick-folder');
      const data = await response.json();
      if (data.path) {
        document.getElementById('output_dir').value = data.path;
      }
    } catch (error) {
      console.error('Error opening folder picker:', error);
    }
  });

  document.getElementById('restart-app').addEventListener('click', async function() {
    if (!confirm('Restart the application now?')) return;
    const btn = this;
    btn.disabled = true;
    btn.textContent = 'Restarting...';
    try {
      await fetch('{{ url_for("updates.restart") }}', { method: 'POST' });
    } catch (_) {
      // Expected: server killed the connection on os._exit(0) — restart was sent
    }
    // After the fetch (success or network error), server is restarting.
    btn.textContent = 'Waiting for server...';
    const checkUrl = '{{ url_for("main.index") }}';
    // Wait 2s for server to fully shut down before polling
    setTimeout(() => {
      const checkInterval = setInterval(async () => {
        try {
          const r = await fetch(checkUrl, { cache: 'no-store' });
          if (r.ok) {
            clearInterval(checkInterval);
            window.location.href = checkUrl;
          }
        } catch (_) {
          // server still restarting
        }
      }, 1500);
      // Give up after 60 seconds and restore button
      setTimeout(() => {
        clearInterval(checkInterval);
        btn.disabled = false;
        btn.textContent = 'Restart App';
        alert('Server did not respond within 60 seconds. Please refresh manually.');
      }, 60000);
    }, 2000);
  });
</script>
{% endblock %}

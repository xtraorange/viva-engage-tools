{% extends "base.html" %}

{% block title %}Edit Group {{ group.handle }}{% endblock %}

{% block content %}
<h1>Edit Group: {{ group.handle }}</h1>
<form method="post">
  <div class="row">
    <div class="col-md-6">
      <fieldset class="mb-4">
        <legend class="mb-3">Basic Information</legend>
        <div class="mb-3">
          <label for="display_name" class="form-label">Display Name</label>
          <input type="text" class="form-control" id="display_name" name="display_name" value="{{ config.display_name }}">
        </div>
        <div class="mb-3">
          <label for="tags" class="form-label">Tags (comma-separated)</label>
          <input type="text" class="form-control" id="tags" name="tags" value="{{ config.tags_str }}">
        </div>
      </fieldset>

      <fieldset>
        <legend class="mb-3">Output Settings</legend>
        <div class="mb-3">
          <label for="email_recipient" class="form-label">Email Recipient</label>
          <input type="email" class="form-control" id="email_recipient" name="email_recipient" value="{{ config.email_recipient }}">
        </div>
        <div class="mb-3">
          <label for="output_dir" class="form-label">Output Directory Override</label>
          <div class="input-group">
            <input type="text" class="form-control" id="output_dir" name="output_dir" value="{{ config.output_dir }}">
            <button class="btn btn-outline-secondary" type="button" id="browse_output_dir">Browse...</button>
          </div>
          <small class="form-text text-muted">Leave empty to use the global output directory</small>
        </div>
      </fieldset>
    </div>
    <div class="col-md-6">
      <fieldset>
        <legend class="mb-3">SQL Query</legend>
        <div class="mb-3">
          <label for="query" class="form-label">Query</label>
          <textarea class="form-control font-monospace" id="query" name="query" rows="10" style="font-size: 0.9rem;">{{ config.query }}</textarea>
          <button type="button" class="btn btn-sm btn-outline-primary mt-2" id="btn-use-builder">
            🔨 Use Query Builder
          </button>
        </div>
      </fieldset>
    </div>
  </div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('groups.groups') }}" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>

<script>
  const draftKey = `group_edit_draft:${window.location.pathname}`;

  function collectDraft() {
    return {
      display_name: document.getElementById('display_name').value,
      tags: document.getElementById('tags').value,
      email_recipient: document.getElementById('email_recipient').value,
      output_dir: document.getElementById('output_dir').value,
      query: document.getElementById('query').value,
    };
  }

  function restoreDraft() {
    const raw = sessionStorage.getItem(draftKey);
    if (!raw) return;
    try {
      const draft = JSON.parse(raw);
      if (typeof draft.display_name === 'string') document.getElementById('display_name').value = draft.display_name;
      if (typeof draft.tags === 'string') document.getElementById('tags').value = draft.tags;
      if (typeof draft.email_recipient === 'string') document.getElementById('email_recipient').value = draft.email_recipient;
      if (typeof draft.output_dir === 'string') document.getElementById('output_dir').value = draft.output_dir;
      if (typeof draft.query === 'string') document.getElementById('query').value = draft.query;
    } catch (_) {
      // Ignore malformed session data.
    }
  }

  document.getElementById('browse_output_dir').addEventListener('click', async function() {
    try {
      const response = await fetch('/api/pick-folder');
      const data = await response.json();
      if (data.path) {
        document.getElementById('output_dir').value = data.path;
      }
    } catch (error) {
      alert('Error opening folder picker: ' + error);
    }
  });

  document.getElementById('btn-use-builder').addEventListener('click', (e) => {
    e.preventDefault();
    sessionStorage.setItem(draftKey, JSON.stringify(collectDraft()));
    // Redirect to query builder with return path
    sessionStorage.setItem('return_to', window.location.pathname);
    window.location.href = '/query-builder';
  });

  // Check if returning from query builder
  window.addEventListener('load', () => {
    restoreDraft();
    const acceptedQuery = sessionStorage.getItem('accepted_query_sql');
    if (acceptedQuery) {
      document.getElementById('query').value = acceptedQuery;
      sessionStorage.removeItem('accepted_query_sql');
    }
  });

  document.querySelector('form').addEventListener('submit', () => {
    sessionStorage.removeItem(draftKey);
  });
</script>
{% endblock %}
